services:
  - type: web
    name: forecast-backend
    env: python
    buildCommand: pip install -r forecast-backend/requirements.txt
    startCommand: uvicorn forecast-backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: forecast-db
      - key: JWT_SECRET
        value: replace-this-with-a-long-random-string
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: ENABLE_BOT_SIMULATOR
        value: "false"
      - key: STARTING_BALANCE
        value: "1000"
      - key: CORS_ORIGINS
        value: https://forecast-frontend.onrender.com

  - type: web
    name: forecast-frontend
    env: static
    buildCommand: cd forecast-frontend && npm ci && npm run build
    staticPublishPath: forecast-frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://forecast-backend.onrender.com/api
      - key: VITE_WS_BASE
        value: wss://forecast-backend.onrender.com/ws

databases:
  - name: forecast-db
    databaseName: forecast
    plan: starter
